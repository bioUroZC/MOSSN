name: Usage question
description: Ask for help using mossn on your data or workflow
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Questions are welcome. Please share enough context so the problem can be reproduced or understood.
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the analysis goal or workflow you are aiming for
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Current code or command
      render: python
  - type: textarea
    id: data-shape
    attributes:
      label: Input data shape
      description: Describe the rows, columns, identifiers, and omics layers involved
  - type: textarea
    id: blocking
    attributes:
      label: What is blocking you?
      description: Error message, confusing behavior, or unclear documentation
    validations:
      required: true
